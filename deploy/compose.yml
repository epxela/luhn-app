services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: luhn
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"

  backend:
    build: ../backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: luhn
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    depends_on:
      - db

  frontend:
    build: ../frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

  adminer:
    image: adminer
    ports:
      - "8082:8080"
